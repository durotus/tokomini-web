<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Pro - Toko Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        fredoka: ['Fredoka', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        kasir: {
                            sidebar: '#2563EB', /* Biru utama kasirpro */
                            bg: '#F8FAFC',
                            textDark: '#1E293B'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .font-title { font-family: 'Fredoka', sans-serif; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <aside class="w-64 bg-kasir-sidebar text-white flex flex-col justify-between shadow-lg z-30 flex-shrink-0">
        <div>
            <div class="p-6 border-b border-blue-500 flex items-center gap-3">
                <i class="fa-solid fa-calculator text-2xl"></i>
                <span class="font-title text-2xl tracking-wide font-bold">KASIRPRO</span>
            </div>
            
            <nav class="p-4 space-y-2">
                <p class="text-blue-200 text-[10px] font-bold uppercase tracking-wider px-3 mb-1">Katalog Produk</p>

                <button onclick="switchView('menu-pisang')" id="nav-menu-pisang" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-blue-100 hover:bg-blue-700/50 hover:text-white transition-all bg-blue-700 text-white">
                    <span>🍌</span> Pisang Goreng Coklat
                </button>

                <button onclick="switchView('menu-cireng')" id="nav-menu-cireng" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-blue-100 hover:bg-blue-700/50 hover:text-white transition-all">
                    <span>🥟</span> Cireng Isi Gurih
                </button>

                <button onclick="switchView('menu-donat')" id="nav-menu-donat" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-blue-100 hover:bg-blue-700/50 hover:text-white transition-all">
                    <span>🍩</span> Donat Mini Manis
                </button>
            </nav>
        </div>

        <div class="p-4 border-t border-blue-500 bg-blue-700/40">
            <button onclick="openCartModal()" class="w-full bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-2.5 px-4 rounded-xl flex items-center justify-between shadow transition-colors">
                <span class="flex items-center gap-2"><i class="fa-solid fa-shopping-basket"></i> Keranjang</span>
                <span id="sidebar-cart-count" class="bg-white text-amber-600 px-2 py-0.5 rounded-full text-[10px]">0</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col h-full overflow-hidden bg-slate-50">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0">
            <div class="flex items-center gap-2">
                <span id="page-title-text" class="font-bold text-slate-800 text-base">Kelola Menu / Pisang Goreng Coklat Mini</span>
            </div>
            <div class="flex items-center gap-2 text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full">
                <i class="fa-solid fa-circle text-emerald-500 text-[8px] animate-pulse"></i> Admin Toko Mini Online
            </div>
        </header>

        <div class="flex-grow p-6 overflow-y-auto flex items-center justify-center">
            
            <div id="view-product-container" class="w-full">
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col md:flex-row max-w-4xl mx-auto w-full">
                    <div class="md:w-1/2 aspect-square md:h-auto bg-slate-100">
                        <img id="prod-detail-img" src="pisang.jpg.jfif" alt="Pisang Goreng Coklat Mini" class="w-full h-full object-cover">
                    </div>
                    
                    <div class="md:w-1/2 p-8 flex flex-col justify-between">
                        <div>
                            <span id="prod-detail-tag" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full uppercase tracking-wider inline-block mb-3">Menu Pisang</span>
                            <h2 id="prod-detail-name" class="font-title text-2xl font-bold text-slate-800 mb-1">Pisang Goreng Coklat Mini</h2>
                            <p id="prod-detail-desc" class="text-xs text-slate-400 mb-5">Camilan pisang ambon krispi goreng disiram coklat kental manis melimpah ditambah taburan parutan keju gurih melimpah.</p>
                            
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
                                <label id="prod-detail-option-label" class="block
